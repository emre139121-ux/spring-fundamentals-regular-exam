<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Activities · EventSphere')}">
    <meta charset="UTF-8" /><title>Manage Activities</title><link rel="stylesheet" href="style.css" />
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="page-section">

    <div class="container">

        <div class="page-header">

            <h1>Manage Activities</h1>

            <p>
                Add activities that event Attendees can visit
                during the event.
            </p>

        </div>

    </div>

</section>

<section class="form-section">

    <div class="form-card large">

        <h2>Add activities</h2>

        <form th:action="@{/activities/create}"
              method="post">

            <div class="form-group">

                <label>Title</label>

                <input type="text"
                       name="title">

                <small class="error"
                       th:errors="*{title}">
                </small>

            </div>

            <div class="form-group">

                <label>Image URL</label>

                <input type="text"
                       name="imageUrl">

                <small class="error"
                       th:errors="*{imageUrl}">
                </small>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea rows="5"
                          name="description">
                </textarea>

                <small class="error"
                       th:errors="*{description}">
                </small>

            </div>

            <button class="btn-primary">

                Add Activities

            </button>

        </form>

    </div>

</section>

<section class="page-section">

    <div class="container">

        <h2>Current Activities</h2>

        <div class="trip-grid">

            <div class="trip-card"
                 th:each="attraction : ${activities}">

                <img th:src="${activities.imageUrl}"
                     alt="Attraction">

                <h3 th:text="${activities.title}">
                </h3>

                <p th:text="${activities.description}">
                </p>

                <div class="action-buttons">

                    <a class="btn-secondary"
                       th:href="@{/activities/{id}/edit(id=${activities.id})}">

                        Edit

                    </a>

                    <form th:action="@{/activities/{id}/delete(id=${activities.id})}"
                          method="post">

                        <button class="btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
