<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Create Event · EventSphere')}">
    <meta charset="UTF-8" /><title>Create Event</title><link rel="stylesheet" href="style.css" />
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar-auth}"></header>

<section class="form-section">

    <div class="form-card large">

        <h2>Create New Event</h2>

        <form th:action="@{/events/create}"
              th:object="${eventRequest}"
              method="post">

            <div class="form-group">
                <label>Location</label>
                <input type="text" th:field="*{location}">
                <small class="error"
                       th:errors="*{location}"></small>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea rows="6"
                          th:field="*{description}"></textarea>
                <small class="error"
                       th:errors="*{description}"></small>
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Event Date</label>
                    <input type="date"
                           th:field="*{eventDate}">
                    <small class="error"
                           th:errors="*{eventDate}"></small>
                </div>

            </div>

            <button class="btn-primary">

                Create Event

            </button>

        </form>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
