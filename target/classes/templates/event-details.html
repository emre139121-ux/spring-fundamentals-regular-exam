<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(${event != null} ? ${event.title} + ' · EventSphere' : 'Event · EventSphere')}">
    <meta charset="UTF-8" /><title>Event details</title><link rel="stylesheet" href="style.css" />
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar-auth}"></header>

<section class="event-hero">

    <div class="container">

        <h1 th:text="${event.location}">
        </h1>

        <div class="event-date">

            <h2 th:text="${event.eventDate}"></h2>

        </div>

    </div>

</section>

<section class="page-section">

    <div class="container">

        <div class="event-details-card">

            <h2>About This Event</h2>

            <p th:text="${event.description}">
                Description
            </p>

            <hr>

            <p>

                <strong>Created By:</strong>

                <span th:text="${event.organizer.username}">
                    Organizer
                </span>

            </p>

            <div class="action-buttons">

                <a class="btn-primary"
                   th:href="@{/events/{id}/join(id=${event.id})}">

                    Join Event

                </a>

                <a class="btn-secondary"
                   th:href="@{/events/{id}/edit(id=${event.id})}">

                    Edit

                </a>

                <form th:action="@{/events/{id}/delete(id=${event.id})}"
                      method="post">

                    <button class="btn-danger">

                        Delete

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

<section class="page-section">

    <div class="container">

        <h2>Activities</h2>

        <div class="event-grid">

            <div class="event-card"
                 th:each="activities : ${event.activities}">

                <img th:src="${activities.imageUrl}"
                     alt="Activities">

                <h3 th:text="${activities.title}">
                </h3>

                <p th:text="${activities.description}">
                </p>

            </div>

        </div>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
