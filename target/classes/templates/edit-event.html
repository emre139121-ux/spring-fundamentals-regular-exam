<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Edit Event · EventSphere')}">
    <meta charset="UTF-8" /><title>Edit Event</title><link rel="stylesheet" href="style.css" />
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main>
    <div class="container" style="max-width:720px;">
        <div class="page-header">
            <div>
                <h1>Edit event</h1>
                <p>Update your event details below.</p>
            </div>
            <a class="btn btn-secondary" th:href="@{'/events/' + ${eventId}}" href="event-details.html">View event</a>
        </div>

        <div class="card">
            <form class="form" th:action="@{'/events/' + ${eventId} + '/edit'}" action="event-details.html"
                  th:object="${eventForm}" method="post" novalidate>
                <input type="hidden" name="_method" value="put" />

                <div class="form-group">
                    <label class="form-label" for="title">Title</label>
                    <input class="form-control" id="title" type="text" th:field="*{title}" name="title"
                           required minlength="3" maxlength="100"
                           th:classappend="${#fields.hasErrors('title')} ? 'field-invalid'" />
                    <small class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea class="form-control" id="description" th:field="*{description}" name="description"
                              required minlength="10" maxlength="2000"
                              th:classappend="${#fields.hasErrors('description')} ? 'field-invalid'"></textarea>
                    <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="location">Location</label>
                    <input class="form-control" id="location" type="text" th:field="*{location}" name="location"
                           required minlength="2" maxlength="120"
                           th:classappend="${#fields.hasErrors('location')} ? 'field-invalid'" />
                    <small class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}">Location error</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="eventDate">Date &amp; time</label>
                    <input class="form-control" id="eventDate" type="datetime-local" th:field="*{eventDate}" name="eventDate" required
                           th:classappend="${#fields.hasErrors('eventDate')} ? 'field-invalid'" />
                    <small class="error" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}">Date error</small>
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary" th:href="@{'/events/' + ${eventId}}" href="event-details.html">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
