<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!-- Navbar for unauthenticated/guest users -->
<nav th:fragment="navbar-guest">

    <div class="container nav-container">

        <a th:href="@{/}"
           class="logo">

            Event Planner

        </a>

        <ul class="nav-links">

            <li>
                <a th:href="@{/}">
                    Home
                </a>
            </li>

            <li>
                <a th:href="@{/events}">
                    Events
                </a>
            </li>

            <li>
                <a th:href="@{/login}">
                    Login
                </a>
            </li>

            <li>
                <a th:href="@{/register}">
                    Register
                </a>
            </li>

        </ul>

    </div>

</nav>

<!-- Navbar for authenticated users -->
<nav th:fragment="navbar-auth">

    <div class="container nav-container">

        <a th:href="@{/}"
           class="logo">

            Event Planner

        </a>

        <ul class="nav-links">

            <li>
                <a th:href="@{/}">
                    Home
                </a>
            </li>

            <li>
                <a th:href="@{/events}">
                    Events
                </a>
            </li>

            <li>
                <a th:href="@{/events/create}">
                    Create Event
                </a>
            </li>

            <li>
                <a th:href="@{/my-events}">
                    My Events
                </a>
            </li>

            <li>
                <form th:action="@{/logout}"
                      method="POST"
                      style="display:inline;">
                    <button type="submit"
                            class="btn-logout">
                        Logout
                    </button>
                </form>
            </li>

        </ul>

    </div>

</nav>
</body>
</html>
